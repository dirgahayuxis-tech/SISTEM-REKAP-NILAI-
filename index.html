
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Nilai Bahasa Arab - MTsN 2 Bulukumba</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bs-primary: #0f5132; /* Deep Green */
        --bs-success: #198754; /* Islamic Green Base */
        --islamic-gold: #d4af37; /* Gold Accent */
        --islamic-gold-light: #f3e5ab;
        --islamic-dark: #0b3d26;
        --islamic-bg: #f4f6f5;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--islamic-bg);
        color: #333;
      }
      .font-arabic {
        font-family: 'Amiri', serif;
      }
      
      /* Professional Sidebar with Pattern */
      .sidebar {
        background-color: var(--islamic-dark);
        background-image: radial-gradient(var(--islamic-gold) 0.5px, transparent 0.5px), radial-gradient(var(--islamic-gold) 0.5px, var(--islamic-dark) 0.5px);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        min-height: 100vh;
        color: white;
        border-right: 3px solid var(--islamic-gold);
        position: relative;
      }
      .sidebar::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(180deg, rgba(11,61,38,0.95) 0%, rgba(15,81,50,0.98) 100%);
        z-index: 0;
      }
      .sidebar-content {
        position: relative;
        z-index: 1;
      }

      /* Navigation Items */
      .nav-link {
        color: rgba(255,255,255,0.75);
        border-radius: 8px;
        margin-bottom: 8px;
        padding: 12px 15px;
        transition: all 0.3s ease;
        border-left: 4px solid transparent;
      }
      .nav-link:hover {
        background-color: rgba(255,255,255,0.05);
        color: var(--islamic-gold);
        transform: translateX(5px);
      }
      .nav-link.active {
        background-color: rgba(255,255,255,0.1);
        color: var(--islamic-gold);
        border-left: 4px solid var(--islamic-gold);
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      }

      /* Cards & Content */
      .card {
        border: none;
        border-radius: 12px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.04);
        border-top: 3px solid transparent;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .card-dashboard {
        border-top: 3px solid var(--islamic-gold);
      }
      .card:hover {
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      }
      
      .btn-primary {
        background-color: var(--bs-primary);
        border-color: var(--bs-primary);
      }
      .btn-primary:hover {
        background-color: #0a3622;
        border-color: #0a3622;
      }
      .btn-gold {
        background-color: var(--islamic-gold);
        color: #fff;
        border: none;
      }
      .btn-gold:hover {
        background-color: #b8962e;
        color: #fff;
      }
      .text-gold {
        color: var(--islamic-gold) !important;
      }

      /* Tables General */
      .table-responsive {
        overflow-x: auto;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.05);
      }
      
      /* --- CUSTOM TABLE HEADERS (HIGH CONTRAST) --- */
      .bg-header-dark { background-color: #212529 !important; color: white !important; }
      .bg-header-formatif { background-color: #0d6efd !important; color: white !important; } /* Blue */
      .bg-header-sumatif { background-color: #fd7e14 !important; color: white !important; } /* Orange */
      .bg-header-sas { background-color: #dc3545 !important; color: white !important; } /* Red */
      .bg-header-result { background-color: #198754 !important; color: white !important; } /* Green */
      .bg-header-ai { background-color: #6610f2 !important; color: white !important; } /* Purple */

      /* Sub-headers (Slightly lighter but still colored) */
      .bg-sub-formatif { background-color: #cfe2ff !important; color: #084298 !important; font-weight: bold; }
      .bg-sub-sumatif { background-color: #ffe5d0 !important; color: #994d0b !important; font-weight: bold; }
      .bg-sub-sas { background-color: #f8d7da !important; color: #842029 !important; font-weight: bold; }

      /* Sticky Table Styles - IMPROVED */
      .sticky-header {
        position: sticky;
        top: 0;
        z-index: 20;
      }
      
      /* Kolom Nomor (Kiri Paling Ujung) */
      .col-sticky-no {
        position: sticky;
        left: 0;
        z-index: 15;
        background-color: #f8f9fa; /* Light gray background */
        border-right: 1px solid #dee2e6;
        width: 50px;
        min-width: 50px;
        text-align: center;
      }

      /* Kolom Nama (Sebelah Kolom Nomor) */
      .col-sticky-name {
        position: sticky;
        left: 50px; /* Sesuai lebar kolom No */
        z-index: 15;
        background-color: #fff; /* Wajib putih agar tidak transparan */
        border-right: 3px double #adb5bd; /* Batas kanan lebih tegas */
        box-shadow: 4px 0 5px -2px rgba(0,0,0,0.2); /* Efek bayangan saat digeser */
        width: 250px;
        min-width: 250px;
        max-width: 250px;
        white-space: normal !important; /* Agar teks panjang turun ke bawah */
        word-wrap: break-word;
      }

      /* Fix Z-Index untuk Header Sticky */
      th.col-sticky-no, th.col-sticky-name {
        z-index: 30 !important; /* Header harus di atas isi tabel */
        vertical-align: middle;
      }
      
      /* Fix Background untuk isi tabel sticky agar teks di belakangnya tidak tembus */
      td.col-sticky-no, td.col-sticky-name {
         background-color: #fff;
      }

      /* Input Fields in Table */
      .table-input {
        transition: all 0.2s;
        font-weight: 500;
        background-color: #fff; 
        border: 1px solid #dee2e6;
        min-width: 50px;
      }
      .table-input:focus {
        background-color: #fff3cd; /* Kuning muda saat fokus */
        border-color: #ffc107;
        box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.25);
        transform: scale(1.05);
      }

      /* Attendance Colors & Clean Select */
      .bg-att-H { background-color: #d1e7dd !important; color: #0f5132 !important; border: 1px solid #badbcc; }
      .bg-att-I { background-color: #fff3cd !important; color: #856404 !important; border: 1px solid #ffecb5; }
      .bg-att-S { background-color: #cff4fc !important; color: #055160 !important; border: 1px solid #b6effb; }
      .bg-att-A { background-color: #f8d7da !important; color: #842029 !important; border: 1px solid #f5c2c7; }

      .clean-select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: none !important; /* Hapus panah dropdown Bootstrap */
        padding: 0 !important;
        text-align: center;
        text-align-last: center;
        cursor: pointer;
        font-weight: bold;
        border-radius: 0;
      }
      .clean-select:hover {
        opacity: 0.8;
      }
      .clean-select option {
        background-color: white;
        color: black;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        height: 12px;
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--islamic-gold); 
        border-radius: 6px;
        border: 2px solid #f1f1f1;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b8962e; 
      }

      /* Print Styles */
      @media print {
        @page {
          size: A4 landscape;
          margin: 10mm;
        }
        body {
          background-color: white !important;
          font-family: 'Times New Roman', serif;
        }
        .no-print, .sidebar, header, .btn, .form-select, .dropdown {
          display: none !important;
        }
        .main-content {
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .card {
          border: none !important;
          box-shadow: none !important;
        }
        table {
          width: 100% !important;
          border-collapse: collapse !important;
          border: 1px solid black !important;
        }
        th, td {
          border: 1px solid black !important;
          padding: 4px !important;
          font-size: 11pt !important;
          color: black !important;
        }
        .sticky-header, .col-sticky-no, .col-sticky-name {
          position: static !important;
          overflow: visible !important;
          box-shadow: none !important;
          border: 1px solid black !important;
        }
        .bg-header-formatif, .bg-header-sumatif, .bg-header-sas, .bg-header-result {
            background-color: #ddd !important;
            color: black !important;
        }
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    </style>
